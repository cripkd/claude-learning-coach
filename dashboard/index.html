<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Coach — Dashboards</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div id="app">
    <div class="not-configured">
      <h1>Each course has its own dashboard</h1>
      <p>Dashboards live inside each course folder:</p>
      <p><code>courses/{your-course}/dashboard/index.html</code></p>
      <p>Run <code>/init-coach</code> in Claude Code to set up a course. The dashboard is generated automatically and placed in the course folder.</p>
    </div>
  </div>
  <script type="application/json" id="state">{}</script>
  <script src="dashboard.js"></script>
</body>
</html>
